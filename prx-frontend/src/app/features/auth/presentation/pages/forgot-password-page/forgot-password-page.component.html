<section class="flex align-items-center justify-content-center w-full">
  <div class="w-full mx-auto px-3 sm:px-4 forgot-password-page__container">
    <div class="flex flex-column align-items-center text-center mb-4 md:mb-5">
      <img src="/logo/prx-logo.png" alt="Logo de PRX" class="mb-3 forgot-password-page__logo" />

      <h1 class="m-0">Enviar código</h1>

      <p class="mt-3 mb-0 text-sm md:text-base text-color-secondary">
        Te enviaremos un código de recuperación a tu correo electrónico.
      </p>
    </div>

    <div class="p-3 md:p-4 forgot-password-page__panel">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
        <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>

        <p-button
          type="submit"
          label="Enviar código"
          icon="pi pi-send"
          [loading]="submitting()"
          [disabled]="submitting()"
          styleClass="w-full"
          [raised]="true"
          size="large"
        ></p-button>

        <div class="flex justify-content-center">
          <a routerLink="/auth/login" class="forgot-password-page__link text-sm">
            Volver a iniciar sesión
          </a>
        </div>
      </form>
    </div>
  </div>
</section>
