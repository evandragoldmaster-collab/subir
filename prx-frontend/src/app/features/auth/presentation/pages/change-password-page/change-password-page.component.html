<section class="flex align-items-center justify-content-center w-full change-password-page">
  <div class="w-full mx-auto px-3 sm:px-4 change-password-page__container">
    <div class="flex flex-column align-items-center text-center mb-4 md:mb-5">
      <h1 class="m-0">Cambiar contraseña</h1>

      <p class="m-0 mt-2 text-color-secondary change-password-page__subtitle">
        Actualiza tu contraseña para mantener segura tu cuenta
      </p>
    </div>

    <div class="p-3 md:p-4">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
        <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>

        <div class="grid formgrid p-fluid -mx-2">
          <div class="col-12 px-2">
            <p-button
              type="submit"
              severity="primary"
              label="Cambiar contraseña"
              icon="pi pi-lock"
              styleClass="w-full"
              [loading]="submitting()"
              [disabled]="submitting()"
            ></p-button>
          </div>

          <div class="col-12 px-2 mt-2">
            <p-button
              type="button"
              label="Cancelar"
              icon="pi pi-times"
              severity="secondary"
              variant="outlined"
              styleClass="w-full"
              [disabled]="submitting()"
              (onClick)="cancel()"
            ></p-button>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
