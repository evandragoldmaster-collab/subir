<section class="flex align-items-center justify-content-center w-full">
  <div class="w-full mx-auto px-3 sm:px-4 reset-password-page__container">
    <div class="flex flex-column align-items-center text-center mb-4 md:mb-5">
      <img src="/logo/prx-logo.png" alt="Logo de PRX" class="mb-3 reset-password-page__logo" />

      <h1 class="m-0">Restablecer contraseña</h1>

      <p class="mt-3 mb-0 text-sm md:text-base text-color-secondary">
        Ingresa el código de recuperación y tu nueva contraseña.
      </p>

      @if (hasEmail()) {
        <p class="mt-2 mb-0 text-sm font-medium">
          {{ email() }}
        </p>
      }
    </div>

    <div class="p-3 md:p-4 reset-password-page__panel">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
        <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>

        <p class="m-0 text-center text-sm text-color-secondary">
          El código expira en {{ passwordResetCodeExpiresMinutes }} minutos.
        </p>

        <p-button
          type="submit"
          label="Actualizar contraseña"
          icon="pi pi-key"
          [loading]="submitting()"
          [disabled]="submitting()"
          styleClass="w-full"
          [raised]="true"
          size="large"
        ></p-button>

        <div class="flex justify-content-center">
          <a
            routerLink="/auth/login"
            class="text-sm font-medium no-underline reset-password-page__link"
          >
            Volver a iniciar sesión
          </a>
        </div>
      </form>
    </div>
  </div>
</section>
