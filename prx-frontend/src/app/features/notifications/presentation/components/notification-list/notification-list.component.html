<div class="notification-list w-full">
  @if (loading()) {
    <div class="text-center p-4">
      <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
    </div>
  } @else if (notifications().length === 0) {
    <div class="text-center p-5 text-color-secondary">
      <i class="pi pi-bell-slash text-4xl mb-3 block"></i>
      <p class="m-0">No tienes notificaciones.</p>
    </div>
  } @else {
    @for (notification of notifications(); track notification.id) {
      <app-notification-item
        [notification]="notification"
        (deleted)="onDeleted($event)"
        (invitationResolved)="onInvitationResolved($event)"
      />
    }

    @if (total() > 0) {
      <div class="mt-3">
        <app-pagination
          [first]="(page() - 1) * limit()"
          [rows]="limit()"
          [totalRecords]="total()"
          (pageChange)="onPageChange($event)"
        />
      </div>
    }
  }
</div>
