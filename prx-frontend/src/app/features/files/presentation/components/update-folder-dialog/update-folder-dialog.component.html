<p-dialog
  [visible]="visible()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [style]="{ width: 'min(92vw, 32rem)' }"
  [breakpoints]="{ '640px': '94vw' }"
  appendTo="body"
  (visibleChange)="handleVisibleChange($event)"
  (onHide)="close()"
  (onShow)="reset()"
>
  <ng-template pTemplate="header">
    <div class="flex flex-column gap-1">
      <span>Editar carpeta</span>
      <span class="text-sm text-color-secondary"> Actualiza el nombre o color de la carpeta. </span>
    </div>
  </ng-template>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
    <div [class.update-folder-dialog__form-locked]="loading()">
      <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>
    </div>

    <div class="flex flex-column sm:flex-row justify-content-end gap-2">
      <p-button
        type="button"
        label="Cancelar"
        icon="pi pi-times"
        severity="secondary"
        variant="outlined"
        [disabled]="loading()"
        (onClick)="close()"
      ></p-button>

      <p-button
        type="submit"
        label="Guardar cambios"
        icon="pi pi-check"
        [loading]="loading()"
        [disabled]="loading()"
      ></p-button>
    </div>
  </form>
</p-dialog>
